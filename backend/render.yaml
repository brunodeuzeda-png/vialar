services:
  - type: web
    name: vialar
    env: node
    region: ohio
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vialar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: WA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: vialar
          type: web
          property: host
    disk:
      name: wa-sessions
      mountPath: /opt/render/project/src/.wa_sessions
      sizeGB: 1

databases:
  - name: vialar-db
    databaseName: vialar
    plan: free
    region: ohio
