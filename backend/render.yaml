services:
  - type: web
    name: sindico-gestao-api
    env: node
    region: ohio
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sindico-gestao-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: WA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      name: wa-sessions
      mountPath: /opt/render/project/src/.wa_sessions
      sizeGB: 1

databases:
  - name: sindico-gestao-db
    databaseName: sindico_gestao
    plan: starter
    region: ohio
