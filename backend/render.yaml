services:
  - type: web
    name: vialar-api
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vialar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: WA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: vialar-frontend
          type: web
          property: host
    disk:
      name: wa-sessions
      mountPath: /opt/render/project/src/.wa_sessions
      sizeGB: 1

  - type: web
    name: vialar-frontend
    env: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: vialar-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_WS_URL
        sync: false
      - key: PORT
        value: 3000

databases:
  - name: vialar-db
    databaseName: vialar
    plan: free
    region: ohio
