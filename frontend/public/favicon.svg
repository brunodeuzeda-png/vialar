<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Tile background -->
  <rect width="32" height="32" rx="7.5" fill="#BBFF00"/>
  <!-- V left arm -->
  <line x1="7" y1="9" x2="16" y2="23.5" stroke="#0D0D0D" stroke-width="3.2" stroke-linecap="round"/>
  <!-- V right arm -->
  <line x1="25" y1="9" x2="16" y2="23.5" stroke="#0D0D0D" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Bottom routing node -->
  <circle cx="16" cy="23.5" r="2.4" fill="#0D0D0D"/>
  <!-- Top endpoint nodes -->
  <circle cx="7" cy="9" r="1.6" fill="#0D0D0D"/>
  <circle cx="25" cy="9" r="1.6" fill="#0D0D0D"/>
</svg>
