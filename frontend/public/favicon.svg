<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded square base -->
  <rect width="32" height="32" rx="8" fill="#BBFF00"/>
  <!-- V mark — two diagonals converging at bottom node -->
  <path d="M7 8.5 L16 22.5 L25 8.5"
        stroke="#0A0A0A"
        stroke-width="3.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <!-- Bottom convergence node -->
  <circle cx="16" cy="22.5" r="2.2" fill="#0A0A0A"/>
  <!-- Input endpoint dots -->
  <circle cx="7" cy="8.5" r="1.4" fill="#0A0A0A"/>
  <circle cx="25" cy="8.5" r="1.4" fill="#0A0A0A"/>
</svg>
